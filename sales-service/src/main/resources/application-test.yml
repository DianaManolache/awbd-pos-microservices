spring:
  datasource:
    url: jdbc:h2:mem:sales_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

catalog-service:
  url: http://localhost:9999
user-service:
  url: http://localhost:9999

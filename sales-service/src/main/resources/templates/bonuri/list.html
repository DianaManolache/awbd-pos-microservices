<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Bonuri')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4">Bonuri</h1>
    <a href="/web/bonuri/new" class="btn btn-primary mb-3">Deschide bon nou</a>

    <form method="get" th:action="@{/web/bonuri}" class="d-flex align-items-center gap-2 mb-3">
        <input type="hidden" name="sort" th:value="${sort}"/>
        <input type="hidden" name="dir" th:value="${dir}"/>
        <label for="sizeSelect">Bonuri pe pagina:</label>
        <select id="sizeSelect" name="size" class="form-select" style="width:100px" onchange="this.form.submit()">
            <option value="5" th:selected="${size == 5}">5</option>
            <option value="10" th:selected="${size == 10}">10</option>
            <option value="20" th:selected="${size == 20}">20</option>
        </select>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>
                <a th:href="@{/web/bonuri(page=0,size=${size},sort='status',dir=${sort == 'status' and dir == 'asc' ? 'desc' : 'asc'})}">Status</a>
            </th>
            <th>
                <a th:href="@{/web/bonuri(page=0,size=${size},sort='data',dir=${sort == 'data' and dir == 'asc' ? 'desc' : 'asc'})}">Data</a>
            </th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${bonuriPage.content}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.status}"></td>
            <td th:text="${b.data}"></td>
            <td><a th:href="@{/web/bonuri/{id}(id=${b.id})}" class="btn btn-sm btn-secondary">Detalii</a></td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${bonuriPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${bonuriPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/web/bonuri(page=${bonuriPage.number - 1},size=${size},sort=${sort},dir=${dir})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, bonuriPage.totalPages - 1)}" th:classappend="${i == bonuriPage.number} ? 'active'">
                <a class="page-link" th:href="@{/web/bonuri(page=${i},size=${size},sort=${sort},dir=${dir})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${bonuriPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/web/bonuri(page=${bonuriPage.number + 1},size=${size},sort=${sort},dir=${dir})}">Urmator</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>

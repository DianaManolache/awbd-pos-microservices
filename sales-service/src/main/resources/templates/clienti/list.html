<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Clienti')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4">Clienti</h1>
    <div class="alert alert-danger" th:if="${businessError}" th:text="${businessError}"></div>
    <a href="/web/clienti/new" class="btn btn-primary mb-3">Adauga client</a>

    <form method="get" th:action="@{/web/clienti}" class="d-flex align-items-center gap-2 mb-3">
        <input type="hidden" name="sort" th:value="${sort}"/>
        <input type="hidden" name="dir" th:value="${dir}"/>
        <label for="sizeSelect">Clienti pe pagina:</label>
        <select id="sizeSelect" name="size" class="form-select" style="width:100px" onchange="this.form.submit()">
            <option value="5" th:selected="${size == 5}">5</option>
            <option value="10" th:selected="${size == 10}">10</option>
            <option value="20" th:selected="${size == 20}">20</option>
        </select>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>
                <a th:href="@{/web/clienti(page=0,size=${size},sort='nume',dir=${sort == 'nume' and dir == 'asc' ? 'desc' : 'asc'})}">Nume</a>
            </th>
            <th>
                <a th:href="@{/web/clienti(page=0,size=${size},sort='email',dir=${sort == 'email' and dir == 'asc' ? 'desc' : 'asc'})}">Email</a>
            </th>
            <th>Telefon</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${clientiPage.content}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nume}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.telefon}"></td>
            <td>
                <a th:href="@{/web/clienti/{id}/edit(id=${c.id})}" class="btn btn-sm btn-secondary">Editeaza</a>
                <form th:action="@{/web/clienti/{id}/delete(id=${c.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Sigur vrei sa stergi acest client?');">
                    <button type="submit" class="btn btn-sm btn-danger">Sterge</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${clientiPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${clientiPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/web/clienti(page=${clientiPage.number - 1},size=${size},sort=${sort},dir=${dir})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, clientiPage.totalPages - 1)}" th:classappend="${i == clientiPage.number} ? 'active'">
                <a class="page-link" th:href="@{/web/clienti(page=${i},size=${size},sort=${sort},dir=${dir})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${clientiPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/web/clienti(page=${clientiPage.number + 1},size=${size},sort=${sort},dir=${dir})}">Urmator</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>

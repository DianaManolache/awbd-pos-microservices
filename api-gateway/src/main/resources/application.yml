server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          # XForwardedHeadersFilter e activat implicit, dar bean-ul lui nu se
          # creeaza deloc daca trusted-proxies e gol - Gateway-ul nostru e
          # singurul punct de intrare public (nu exista alt proxy in fata
          # lui), deci acceptam orice adresa ca sursa a request-ului original.
          trusted-proxies: .*
          x-forwarded:
            enabled: true
            host-enabled: true
            port-enabled: true
            proto-enabled: true
            prefix-enabled: true
          default-filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
          routes:
            - id: catalog-web
              uri: lb://catalog-service
              predicates:
                - Path=/web/categorii/**,/web/produse/**,/web/promotii/**
            - id: catalog-api
              uri: lb://catalog-service
              predicates:
                - Path=/api/categorii/**,/api/produse/**,/api/promotii/**
            - id: sales-web
              uri: lb://sales-service
              predicates:
                - Path=/web/bonuri/**,/web/clienti/**,/web/vanzatori/**
            - id: sales-api
              uri: lb://sales-service
              predicates:
                - Path=/api/bons/**,/api/clients/**,/api/vanzatori/**
            - id: user-web
              uri: lb://user-service
              predicates:
                - Path=/,/login,/logout,/web/utilizatori/**
            - id: user-api
              uri: lb://user-service
              predicates:
                - Path=/api/utilizatori/**
            - id: notification-web
              uri: lb://notification-service
              predicates:
                - Path=/web/notificari/**
            - id: notification-api
              uri: lb://notification-service
              predicates:
                - Path=/api/notificari/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoint:
    gateway:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include: gateway,health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Vanzatori')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4">Vanzatori</h1>
    <div class="alert alert-danger" th:if="${businessError}" th:text="${businessError}"></div>
    <a href="/web/vanzatori/new" class="btn btn-primary mb-3">Adauga vanzator</a>
    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Nume</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="v : ${vanzatori}">
            <td th:text="${v.id}"></td>
            <td th:text="${v.nume}"></td>
            <td>
                <a th:href="@{/web/vanzatori/{id}/edit(id=${v.id})}" class="btn btn-sm btn-secondary">Editeaza</a>
                <form th:action="@{/web/vanzatori/{id}/delete(id=${v.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Sigur vrei sa stergi acest vanzator?');">
                    <button type="submit" class="btn btn-sm btn-danger">Sterge</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>

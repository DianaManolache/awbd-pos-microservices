<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Utilizatori')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4">Utilizatori</h1>
    <div class="alert alert-danger" th:if="${businessError}" th:text="${businessError}"></div>
    <a href="/web/utilizatori/new" class="btn btn-primary mb-3">Adauga utilizator</a>
    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Username</th><th>Rol</th><th>Activ</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="u : ${utilizatori}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.rol}"></td>
            <td th:text="${u.activ}"></td>
            <td>
                <a th:href="@{/web/utilizatori/{id}/edit(id=${u.id})}" class="btn btn-sm btn-secondary">Editeaza</a>
                <form th:action="@{/web/utilizatori/{id}/delete(id=${u.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Sigur vrei sa stergi acest utilizator?');">
                    <button type="submit" class="btn btn-sm btn-danger">Sterge</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>

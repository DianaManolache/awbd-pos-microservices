<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Categorie')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4" th:text="${isEdit} ? 'Editeaza categorie' : 'Adauga categorie'"></h1>
    <div class="alert alert-danger" th:if="${businessError}" th:text="${businessError}"></div>
    <form th:action="${formAction}" th:object="${categorie}" method="post">
        <div class="mb-3">
            <label class="form-label">Nume</label>
            <input type="text" class="form-control" th:field="*{nume}" required maxlength="80"/>
            <div class="text-danger" th:if="${#fields.hasErrors('nume')}" th:errors="*{nume}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Salveaza</button>
        <a href="/web/categorii" class="btn btn-outline-secondary">Anuleaza</a>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Produse')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4">Produse</h1>
    <div class="alert alert-danger" th:if="${businessError}" th:text="${businessError}"></div>
    <a href="/web/produse/new" class="btn btn-primary mb-3">Adauga produs</a>

    <form method="get" th:action="@{/web/produse}" class="d-flex align-items-center gap-2 mb-3">
        <input type="hidden" name="sort" th:value="${sort}"/>
        <input type="hidden" name="dir" th:value="${dir}"/>
        <label for="sizeSelect">Produse pe pagina:</label>
        <select id="sizeSelect" name="size" class="form-select" style="width:100px" onchange="this.form.submit()">
            <option value="5" th:selected="${size == 5}">5</option>
            <option value="10" th:selected="${size == 10}">10</option>
            <option value="20" th:selected="${size == 20}">20</option>
        </select>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>
                <a th:href="@{/web/produse(page=0,size=${size},sort='nume',dir=${sort == 'nume' and dir == 'asc' ? 'desc' : 'asc'})}">Nume</a>
            </th>
            <th>
                <a th:href="@{/web/produse(page=0,size=${size},sort='pret',dir=${sort == 'pret' and dir == 'asc' ? 'desc' : 'asc'})}">Pret</a>
            </th>
            <th>Stoc</th>
            <th>Categorie</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produsePage.content}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nume}"></td>
            <td th:text="${p.pret}"></td>
            <td th:text="${p.stoc}"></td>
            <td th:text="${p.categorie != null ? p.categorie.nume : ''}"></td>
            <td>
                <a th:href="@{/web/produse/{id}/edit(id=${p.id})}" class="btn btn-sm btn-secondary">Editeaza</a>
                <form th:action="@{/web/produse/{id}/delete(id=${p.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Sigur vrei sa stergi acest produs?');">
                    <button type="submit" class="btn btn-sm btn-danger">Sterge</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${produsePage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${produsePage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/web/produse(page=${produsePage.number - 1},size=${size},sort=${sort},dir=${dir})}">Anterior</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, produsePage.totalPages - 1)}" th:classappend="${i == produsePage.number} ? 'active'">
                <a class="page-link" th:href="@{/web/produse(page=${i},size=${size},sort=${sort},dir=${dir})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${produsePage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/web/produse(page=${produsePage.number + 1},size=${size},sort=${sort},dir=${dir})}">Urmator</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Promotii')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="container">
    <h1 class="mb-4">Promotii</h1>
    <div class="alert alert-danger" th:if="${businessError}" th:text="${businessError}"></div>
    <a href="/web/promotii/new" class="btn btn-primary mb-3">Adauga promotie</a>
    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Nume</th><th>Procent</th><th>Start</th><th>Final</th><th>Activa</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${promotii}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nume}"></td>
            <td th:text="${p.procentReducere}"></td>
            <td th:text="${p.dataStart}"></td>
            <td th:text="${p.dataFinal}"></td>
            <td th:text="${p.activa}"></td>
            <td>
                <a th:href="@{/web/promotii/{id}/edit(id=${p.id})}" class="btn btn-sm btn-secondary">Editeaza</a>
                <form th:action="@{/web/promotii/{id}/delete(id=${p.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Sigur vrei sa stergi aceasta promotie?');">
                    <button type="submit" class="btn btn-sm btn-danger">Sterge</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
